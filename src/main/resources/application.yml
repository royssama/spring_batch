spring:
  application:
    name: spring-batch
  datasource:
    url: jdbc:p6spy:oracle:thin:@localhost:1521/FREEPDB1
    username: spring_batch
    password: admin
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true

logging:
  level:
    root: info
    com.p6spy: info
    jdbc.sqlonly: off
    jdbc.sqltiming: off
    org.mybatis: debug

app:
  batch:
    general:
      insert-cron: "*/5 * * * * *"
      update5s-cron: "*/10 * * * * *"
      update10s-cron: "*/15 * * * * *"
      select15s-cron: "*/20 * * * * *"
      delete-cron: "*/25 * * * * *"
    tasklet:
      cron: "*/30 * * * * *"
    tasklet-api:
      cron: "*/40 * * * * *"
      endpoint-url: "http://localhost:8081/api/batch/run/tasklet"
      connect-timeout-ms: 3000
      read-timeout-ms: 5000
    chunk:
      cron: "*/35 * * * * *"
